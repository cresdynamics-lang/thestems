# Nginx config for The Stems (DigitalOcean droplet)
# Install: sudo cp nginx/thestems.conf /etc/nginx/sites-available/thestems
# Enable:  sudo ln -sf /etc/nginx/sites-available/thestems /etc/nginx/sites-enabled/
# Test:    sudo nginx -t && sudo systemctl reload nginx
# SSL:     sudo certbot --nginx -d thestemsflowers.co.ke -d www.thestemsflowers.co.ke

server {
    listen 80;
    listen [::]:80;
    server_name thestemsflowers.co.ke www.thestemsflowers.co.ke 178.128.70.10;

    client_max_body_size 10M;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }
}
