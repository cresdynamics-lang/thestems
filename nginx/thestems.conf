# Nginx config for The Stems (DigitalOcean droplet)
# Install: sudo cp nginx/thestems.conf /etc/nginx/sites-available/thestemsflowers
# Enable:  sudo ln -sf /etc/nginx/sites-available/thestemsflowers /etc/nginx/sites-enabled/thestemsflowers
# Test:    sudo nginx -t && sudo systemctl reload nginx
# SSL:     sudo certbot --nginx -d thestemsflowers.co.ke -d www.thestemsflowers.co.ke

# HTTP → HTTPS (apex only; www handled below)
server {
    listen 80;
    listen [::]:80;
    server_name thestemsflowers.co.ke www.thestemsflowers.co.ke;
    return 301 https://thestemsflowers.co.ke$request_uri;
}

# www → apex (HTTPS) — fixes mobile browsers that open www links
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name www.thestemsflowers.co.ke;

    ssl_certificate /etc/letsencrypt/live/thestemsflowers.co.ke/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/thestemsflowers.co.ke/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://thestemsflowers.co.ke$request_uri;
}

# Main site (HTTPS apex)
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name thestemsflowers.co.ke;

    ssl_certificate /etc/letsencrypt/live/thestemsflowers.co.ke/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/thestemsflowers.co.ke/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 10M;

    # Security headers (nginx layer — always sent, even on errors)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }
}
